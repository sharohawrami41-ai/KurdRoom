{% extends "base.html" %}
{% block content %}
  <h2 style="font-size:1.4rem; margin:8px 0 18px">📝 {{ t('essay_checker') }}</h2>
  <div class="card" style="margin-bottom:20px">
    <textarea id="essay" rows="10" placeholder="{{ t('e_paste') }}"></textarea>
    <div style="margin-top:14px">
      <button class="primary" onclick="analyze()" style="width:auto; padding:12px 32px">
        🔍 {{ t('e_analyze') }}</button>
    </div>
  </div>
  <div id="out" style="display:none">
    <div class="card" style="display:flex; align-items:center; gap:26px; margin-bottom:20px;
         flex-wrap:wrap; justify-content:center">
      <div style="position:relative; width:150px; height:150px">
        <svg width="150" height="150" style="transform:rotate(-90deg)">
          <circle cx="75" cy="75" r="64" stroke="rgba(128,128,160,.18)" stroke-width="13" fill="none"/>
          <circle id="ring" cx="75" cy="75" r="64" stroke="var(--ok)" stroke-width="13" fill="none"
                  stroke-linecap="round" stroke-dasharray="402" stroke-dashoffset="402"
                  style="transition:stroke-dashoffset 1s ease, stroke .5s"/>
        </svg>
        <div style="position:absolute; inset:0; display:flex; flex-direction:column;
             align-items:center; justify-content:center">
          <span id="scoreN" style="font-size:2.1rem; font-weight:800">0</span>
          <span style="font-size:.62rem; color:var(--muted)">/ 100</span>
        </div>
      </div>
      <div style="text-align:center">
        <div style="font-size:.8rem; color:var(--muted)">{{ t('e_score') }}</div>
        <div id="grade" style="font-size:2.6rem; font-weight:800; color:var(--accent)"></div>
      </div>
    </div>
    <div class="grid2" style="grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px" id="stats"></div>
    <div class="grid2">
      <div class="card"><h2>⚠️ {{ t('e_long') }}</h2><div class="hint"></div><div id="longs"></div></div>
      <div class="card"><h2>🔁 {{ t('e_rep') }}</h2><div class="hint"></div><div id="reps"></div></div>
    </div>
    <div class="card" style="margin-top:20px"><h2>💡 {{ t('e_tips') }}</h2>
      <div class="hint"></div><div id="tips"></div></div>
  </div>
<script>
const STOP = new Set(("the a an and or but of to in on for with is are was were be been "
  + "this that it as at by from i you he she we they my your his her our their not no so "
  + "من في على إلى عن أن إن كان مع هذا هذه ذلك التي الذي و ثم أو لم لا ما هو هي "
  + "لە و بە بۆ کە ئەو ئەم لەگەڵ هەر دە نا بوو").split(/\s+/));
function analyze() {
  const txt = document.getElementById("essay").value.trim();
  if (!txt) return;
  const words = txt.split(/\s+/).filter(Boolean);
  const sents = txt.split(/[.!?؟।۔]+/).map(s => s.trim()).filter(s => s.length > 2);
  const paras = txt.split(/\n\s*\n|\n/).map(p => p.trim()).filter(p => p.length > 10);
  const avg = sents.length ? (words.length / sents.length) : 0;
  const stats = [
    [words.length, "{{ t('e_words') }}"], [sents.length, "{{ t('e_sentences') }}"],
    [paras.length, "{{ t('e_paragraphs') }}"], [avg.toFixed(1), "{{ t('e_avg') }}"]];
  document.getElementById("stats").innerHTML = stats.map(([n, l]) =>
    '<div class="card" style="text-align:center; padding:16px">' +
    '<div style="font-size:1.8rem; font-weight:800; color:var(--accent)">' + n + "</div>" +
    '<div style="font-size:.72rem; color:var(--muted)">' + l + "</div></div>").join("");
  // long sentences
  const longs = sents.filter(s => s.split(/\s+/).length > 30);
  document.getElementById("longs").innerHTML = longs.length
    ? longs.slice(0, 5).map(s => '<div class="plan medium" style="font-size:.82rem">' +
        esc(s.slice(0, 160)) + "…</div>").join("")
    : '<p style="color:var(--ok)">✓</p>';
  // repeated words
  const freq = {};
  words.forEach(w => {
    const k = w.toLowerCase().replace(/[^\p{L}\p{N}]/gu, "");
    if (k.length > 3 && !STOP.has(k)) freq[k] = (freq[k] || 0) + 1;
  });
  const top = Object.entries(freq).filter(([,n]) => n >= 4)
    .sort((a,b) => b[1]-a[1]).slice(0, 6);
  document.getElementById("reps").innerHTML = top.length
    ? top.map(([w, n]) => '<span class="badge medium" style="margin:3px; font-size:.8rem">' +
        esc(w) + " × " + n + "</span>").join(" ")
    : '<p style="color:var(--ok)">✓</p>';
  // tips
  const tips = [];
  if (longs.length) tips.push("{{ t('tip_long') }}");
  if (paras.length < 3 && words.length > 150) tips.push("{{ t('tip_para') }}");
  if (top.length >= 3) tips.push("{{ t('tip_rep') }}");
  if (words.length < 120) tips.push("{{ t('tip_short') }}");
  if (!tips.length) tips.push("{{ t('tip_good') }}");
  document.getElementById("tips").innerHTML =
    tips.map(t => '<div class="plan medium" style="font-size:.88rem">' + t + "</div>").join("");
  // writing score
  let score = 100;
  score -= Math.min(25, longs.length * 6);                       // long sentences
  score -= Math.min(20, top.length * 4);                          // repetition
  if (words.length < 120) score -= Math.min(25, (120 - words.length) / 5);
  if (paras.length < 3 && words.length > 150) score -= 10;
  if (avg > 0 && (avg < 8 || avg > 26)) score -= 8;               // rhythm
  score = Math.max(20, Math.round(score));
  const grade = score >= 90 ? "A" : score >= 80 ? "B+" : score >= 70 ? "B"
              : score >= 60 ? "C" : score >= 50 ? "D" : "E";
  const ring = document.getElementById("ring");
  document.getElementById("out").style.display = "block";
  document.getElementById("scoreN").textContent = score;
  document.getElementById("grade").textContent = grade;
  ring.style.stroke = score >= 75 ? "var(--ok)" : score >= 55 ? "var(--medium)" : "var(--high)";
  requestAnimationFrame(() =>
    ring.style.strokeDashoffset = 402 * (1 - score / 100));
}
function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
</script>
{% endblock %}
